version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: vendas_db
    environment:
      POSTGRES_USER: vendas_user
      POSTGRES_PASSWORD: vendas_password
      POSTGRES_DB: vendas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendas_user -d vendas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: vendas_backend
    environment:
      DATABASE_URL: postgresql://vendas_user:vendas_password@db:5432/vendas_db
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../data:/app/data
    command: >
      sh -c "python -c 'from database.connection import init_db; init_db()' && uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend Dashboard
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: vendas_frontend
    environment:
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
